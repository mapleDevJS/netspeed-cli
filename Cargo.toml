[package]
name = "netspeed-cli"
version = "0.2.0"
edition = "2021"
description = "Command line interface for testing internet bandwidth using speedtest.net"
license = "MIT"
authors = ["Alexey Ivanov <alexey.ivanov@example.com>"]
repository = "https://github.com/alexeyivanov/netspeed-cli"
rust-version = "1.70"

[[bin]]
name = "netspeed-cli"
path = "src/main.rs"

[lib]
name = "netspeed_cli"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
clap_mangen = "0.2"
reqwest = { version = "0.12", features = ["gzip", "stream"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
quick-xml = { version = "0.37", features = ["serialize"] }
chrono = { version = "0.4", features = ["serde"] }
csv = "1"
sha2 = "0.11"
hex = "0.4"
futures-util = "0.3"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full", "test-util"] }
criterion = "0.5"

[[bench]]
name = "benchmarks"
harness = false

[build-dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
clap_mangen = "0.2"

name: CI

on:
  push:
    branches: [master, main, develop, staging]
  pull_request:
    branches: [master, main, develop, staging]

# Cancel redundant workflow runs on successive pushes to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose
      - name: Build release
        run: cargo build --release

  socket-integration:
    name: Socket Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run mock socket tests
        run: cargo test --test mock_network_test -- --ignored --nocapture
      - name: Run upload integration tests
        run: cargo test --test integration_upload_fetch_test -- --ignored --nocapture
      - name: Run end-to-end socket tests
        run: cargo test --test e2e_test -- --ignored --nocapture

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-pedantic:
    name: Clippy (Pedantic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run clippy with pedantic lint level
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace
      - name: Run doctests
        run: cargo test --doc

  audit:
    name: Security Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo-deny (advisories, licenses, bans, sources)
        run: cargo deny check

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Verify build with MSRV
        run: cargo check

  benchmarks:
    name: Benchmark Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build benchmark targets
        run: cargo bench --no-run

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info --fail-under-lines=80
      - name: Print coverage summary
        run: cargo llvm-cov --all-features --summary-only
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  brew-audit:
    name: Homebrew Audit
    runs-on: macos-latest
    # Only run when a version tag is pushed (release tarball must exist)
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Audit formula
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/mapledevjs/homebrew-netspeed-cli"
          mkdir -p "$TAP_DIR"
          cp netspeed-cli.rb "$TAP_DIR/"
          cd "$TAP_DIR"
          git init
          git add netspeed-cli.rb
          git commit -m "audit"
          brew install --build-from-source mapledevjs/netspeed-cli/netspeed-cli
          brew audit --strict --online mapledevjs/netspeed-cli/netspeed-cli

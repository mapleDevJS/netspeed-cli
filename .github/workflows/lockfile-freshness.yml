name: Lockfile Freshness

on:
  schedule:
    # Run weekly on Monday at 10:00 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:
    # Allow manual trigger for testing

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-lockfile-freshness:
    name: Check Cargo.lock Freshness
    runs-on: ubuntu-latest
    # Only run on main branch to avoid unnecessary work
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Check last modification date
        id: check
        run: |
          LAST_LOCKFILE_COMMIT=$(git log -1 --format='%H' -- Cargo.lock Cargo.toml 2>/dev/null || echo '')

          if [ -z \"$LAST_LOCKFILE_COMMIT\" ]; then
            echo \"status=no-lockfile-found\" >> $GITHUB_OUTPUT
            echo \"No Cargo.lock or Cargo.toml found\"
            exit 0
          fi

          LAST_EPOCH=$(git log -1 --format='%ct' -- Cargo.lock 2>/dev/null || git log -1 --format='%ct' -- Cargo.toml)
          NOW_EPOCH=$(date +%s)
          DAYS_SINCE=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))

          echo \"last_lockfile_commit=$LAST_LOCKFILE_COMMIT\" >> $GITHUB_OUTPUT
          echo \"days_since=$DAYS_SINCE\" >> $GITHUB_OUTPUT
          echo \"status=checking\" >> $GITHUB_OUTPUT
          echo \"Lockfile last modified $DAYS_SINCE days ago\"

      - name: Check and update lockfile
        id: update
        run: |
          cargo update

          if ! git diff --quiet Cargo.lock; then
            echo \"stale=true\" >> $GITHUB_OUTPUT
            echo \"action=needs-update\" >> $GITHUB_OUTPUT
            echo \"Lockfile updates available\"

            git config user.name github-actions[bot]
            git config user.email github-actions[bot]@users.noreply.github.com
            git add Cargo.lock
            git commit -m 'chore: update Cargo.lock dependencies' -m 'Auto-generated by lockfile-freshness workflow'
            git push origin HEAD:main
            echo \"Lockfile updated and committed\"
          else
            echo \"stale=false\" >> $GITHUB_OUTPUT
            echo \"action=no-update-needed\" >> $GITHUB_OUTPUT
            echo \"Lockfile is already up to date\"
          fi

      - name: Report status
        run: |
          echo === Lockfile Freshness Check ===
          echo Days since update: ${{ steps.check.outputs.days_since }}
          echo Status: ${{ steps.check.outputs.status }}
          echo Action: ${{ steps.update.outputs.action || 'unknown' }}
name: Security Scorecard

on:
  # Run weekly for continuous security monitoring
  schedule:
    - cron: '0 6 * * 0'
  # Manual trigger
  workflow_dispatch:
  # Run on PRs that might affect security score
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  scorecard:
    name: OpenSSF Security Scorecard
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to opacity-compliant store
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Security Scorecard
        uses: ossf/scorecard-action@v2.4.1
        with:
          results-file: results.sarif
          results-format: sarif
          # Publish results to GitHub so they're visible in the Security tab
          publish-results: true
          # Upload results to OpenSSF scorecard-api for public visibility
          upload-to-ossf-scores: true
          # Run for a limited time to avoid timeouts
          shade-scorecard: 900s

      - name: Upload results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: security-scorecard

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-scorecard-results
          path: results.sarif
          retention-days: 30

      - name: Display Scorecard results
        run: |
          cat results.sarif | jq -r '.runs[0].results[] | select(.ruleId | contains(\"Scorecard\")) | .message.text'

      - name: Fail if score is below threshold
        # Extract the score from the SARIF file
        run: |
          SCORE=$(cat results.sarif | jq -r '.runs[0].properties.score')
          echo \"Current Security Score: $SCORE\"
          if [ \"$SCORE\" != \"null\" ] && [ \"$SCORE\" -lt 5 ]; then
            echo \"⚠️ Security Score is below threshold (7)\"
            echo \"Please review and improve security controls: https://github.com/ossf/scorecard\"
            # Don't fail the workflow, just warn
          fi
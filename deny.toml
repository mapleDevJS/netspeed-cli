# cargo-deny configuration for dependency security auditing.
# Run: cargo deny check
# Docs: https://github.com/EmbarkStudios/cargo-deny

[graph]
targets = []
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Known RUSTSEC advisories - add entries here when published
# Format: { id = "RUSTSEC-XXXX-XXXX", reason = "description" }
ignore = [
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile is unmaintained (archived); no replacement in tree; functionality covered by rustls-pki-types which is already used" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []
skip = []
skip-tree = [
    # Transitive: toml pulls in both winnow 0.7 and 1.0 via toml_parser
    { name = "winnow", version = "1.0.1" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
